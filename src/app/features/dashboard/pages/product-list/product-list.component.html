<!-- Page Title -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">جميع المنتجات</h4>
  <div class="d-flex gap-2">
    <button class="btn btn-outline-success btn-sm" (click)="downloadBackup()">
      <i class="bi bi-download me-1"></i> تحميل البيانات
    </button>
    <button class="btn btn-outline-primary btn-sm" (click)="restoreBackup()">
      <i class="bi bi-upload me-1"></i> استرجاع البيانات
    </button>
    <a routerLink="/add" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i> إضافة منتج
    </a>
  </div>
</div>

<!-- Stats Cards -->
<div class="row g-3 mb-4">
  <div class="col-6 col-md-6">
    <div class="card border-0 shadow-sm" style="background-color: var(--sz-bg-card);">
      <div class="card-body text-center py-3 pstyle">
        <i class="bi bi-box-seam fs-3 mb-1 d-block" style="color: var(--sz-accent);"></i>
        <h4 class="fw-bold mb-0">{{ allProducts.length }}</h4>
        <small class="text-secondary">إجمالي المنتجات</small>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-6">
    <div class="card border-0 shadow-sm" style="background-color: var(--sz-bg-card);">
      <div class="card-body text-center py-3 pstyle">
        <i class="bi bi-grid fs-3 mb-1 d-block" style="color: var(--sz-accent);"></i>
        <h4 class="fw-bold mb-0">{{ categories.length }}</h4>
        <small class="text-secondary">الأقسام</small>
      </div>
    </div>
  </div>
</div>

<!-- Filters -->
<div class="card border-0 shadow-sm mb-4 p-3 pstyle">
  <div class="d-flex align-items-center gap-2 mb-3">
    <i class="bi bi-funnel" style="color: var(--sz-accent);"></i>
    <span class="fw-semibold">فلترة المنتجات</span>
  </div>

  <div class="row g-3 align-items-end">
    <!-- Category Dropdown -->
    <div class="col-md-3">
      <label class="form-label small mb-1">القسم</label>
      <select class="form-select" [(ngModel)]="selectedCategory"
              style="background-color: var(--sz-bg-card); border-color: var(--sz-border-color); color: inherit;">
        <option value="">كل الأقسام</option>
        @for (cat of categories; track cat.id) {
          <option [value]="cat.slug">{{ cat.name }}</option>
        }
      </select>
    </div>

    <!-- Merchant Dropdown -->
    <div class="col-md-3">
      <label class="form-label small mb-1">التاجر</label>
      <select class="form-select" [(ngModel)]="selectedMerchant"
              style="background-color: var(--sz-bg-card); border-color: var(--sz-border-color); color: inherit;">
        <option value="">كل التجار</option>
        @for (m of merchants; track m.id) {
          <option [value]="m.name">{{ m.name }}</option>
        }
      </select>
    </div>

    <!-- Brand Dropdown -->
    <div class="col-md-3">
      <label class="form-label small mb-1">العلامة التجارية</label>
      <select class="form-select" [(ngModel)]="selectedBrand"
              style="background-color: var(--sz-bg-card); border-color: var(--sz-border-color); color: inherit;">
        <option value="">كل العلامات</option>
        @for (b of brands; track b.id) {
          <option [value]="b.name">{{ b.name }}</option>
        }
      </select>
    </div>

    <!-- Action Buttons -->
    <div class="col-md-3 d-flex gap-2">
      <button class="btn btn-primary flex-grow-1" (click)="search()">
        <i class="bi bi-search me-1"></i> بحث
      </button>
      @if (selectedCategory || selectedMerchant || selectedBrand) {
        <button class="btn btn-outline-secondary" (click)="resetFilters()" title="مسح الفلاتر">
          <i class="bi bi-x-lg"></i>
        </button>
      }
    </div>
  </div>
</div>

<!-- Product Table -->
@if (isLoading) {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-secondary">جاري تحميل المنتجات...</p>
  </div>
} @else if (error) {
  <div class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
    <button class="btn btn-sm btn-outline-danger ms-3" (click)="loadProducts()">إعادة المحاولة</button>
  </div>
} @else {
  <app-product-table
    [products]="products"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)" />
}
