<div class="d-flex justify-content-between align-items-center mb-3">
  <span class="empty-hint">اضغط "إضافة عرض" لإضافة عروض جديدة للمنتج</span>
  <button type="button" class="btn btn-sm btn-outline-primary add-btn" (click)="addOffer()">
    <i class="bi bi-plus-lg me-1"></i>إضافة عرض
  </button>
</div>

@if (offers.length === 0) {
  <div class="empty-state">
    <i class="bi bi-tag"></i>
    <small>لا توجد عروض حالياً</small>
  </div>
}

@for (offer of offers; track $index; let i = $index) {
  <div class="offer-card">
    <div class="offer-header">
      <span class="offer-badge">عرض {{ i + 1 }}</span>
      <button type="button" class="btn btn-sm btn-outline-danger btn-icon" (click)="removeOffer(i)">
        <i class="bi bi-trash"></i>
      </button>
    </div>
    <div class="row g-2">
      <div class="col-md-6">
        <label class="form-label">النص (EN)</label>
        <input type="text" class="form-control form-control-sm" [(ngModel)]="offer.text" (ngModelChange)="onFieldChange()" dir="ltr" >
      </div>
      <div class="col-md-6">
        <label class="form-label">النص (AR)</label>
        <input type="text" class="form-control form-control-sm" [(ngModel)]="offer.textAr" (ngModelChange)="onFieldChange()" >
      </div>

      <!-- Image upload -->
      <div class="col-12">
        <label class="form-label">صورة العرض (اختياري)</label>
        @if (offer.image) {
          <div class="image-preview-row">
            <img [src]="offer.image" alt="معاينة العرض" class="offer-preview-img">
            <button type="button" class="btn btn-sm btn-outline-danger btn-icon" (click)="removeImage(i)">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        } @else {
          <div class="upload-zone" (click)="fileInput.click()" (pasteImage)="onImagePasted($event, i)">
            <input #fileInput type="file" accept="image/*" hidden (change)="onImageSelect($event, i)">
            <i class="bi bi-cloud-arrow-up"></i>
            <span>اضغط لاختيار صورة أو الصق Ctrl+V</span>
          </div>
        }
      </div>
    </div>
  </div>
}
